   <div class="container">
        <h2>Cadastro</h2>
        <section>
        <form action="cadastro.html" method="POST">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>
</section>
 <section>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required><br><br>
</section>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required><br><br>
</section>

            <label for="data">Data de nascimento:</label>
            <input type="date" id="data" name="datanascimento" placeholder="dd/mm/yyyy" required><br><br>
</section>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required><br><br>
</section>

            <label for="gênero">Gênero:</label><br><br>
            <input type="checkbox" id="gen1" name="gen1" value="Feminino" required>
            <label for="gen1"> Feminino</label><br>
            <input type="checkbox" id="gen2" name="gen2" value="Masculino" required>
            <label for="gen2"> Masculino</label><br><br>
</section>

            <label for="interesse">Interesses:</label>
            <input type="checkbox" id="game" name="games" value="games" required>
            <label for="games"> Jogos</label><br>
             <input type="checkbox" id="esportes" name="espoirtes" value="esportes" required>
            <label for="esportes"> Esportes</label><br>
            <input type="checkbox" id="musicas" name="músicas" value="músicas" required>
            <label for="Músicas"> Músicas</label><br>
            <input type="checkbox" id=Livros" name="Livros" value="Livros" required>
            <label for="Livros"> Livros</label><br>
             <input type="checkbox" id="Outros" name="outros" value="outros" required>
            <label for="outros"> Outros</label><br><br>
            <label for="cidade">Cidade:</label>
            <input type="select" id="cidade" name="cidade" placeholder="Sua cidade" required><br><br>
</section>

            <label for="comentarios">Comentários adicionais:</label>
            <input type="textrea" id="comentario" name="comentario" placeholder="comentarios adicionais"required><br><br>
</section>

            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
</section>
